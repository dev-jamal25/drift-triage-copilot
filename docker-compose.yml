# docker-compose.yml
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  mlflow:
    build:
      context: ./mlflow
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MLFLOW_BACKEND_STORE_URI: ${MLFLOW_BACKEND_STORE_URI}
    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri ${MLFLOW_BACKEND_STORE_URI}
      --serve-artifacts
      --artifacts-destination /mlflow/artifacts
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    ports:
      - "5000:5000"

  platform-migrate:
    build:
      context: .
      dockerfile: platform/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PLATFORM_MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      PLATFORM_LOG_LEVEL: ${LOG_LEVEL}
      PLATFORM_MODEL_NAME: ${PLATFORM_MODEL_NAME}
      PLATFORM_MODEL_ALIAS: ${PLATFORM_MODEL_ALIAS}
      PLATFORM_LOAD_MODEL_ON_STARTUP: "false"
    working_dir: /app/platform
    command: uv run alembic upgrade head
    volumes:
      - ./platform:/app/platform
      -  platform_venv:/app/platform/.venv
      - ./shared:/app/shared
  model-service:
    build:
      context: .
      dockerfile: platform/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      mlflow:
        condition: service_started
      platform-migrate:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DATABASE_URL}
      PLATFORM_MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
      PLATFORM_LOG_LEVEL: ${LOG_LEVEL}
      PLATFORM_MODEL_NAME: ${PLATFORM_MODEL_NAME}
      PLATFORM_MODEL_ALIAS: ${PLATFORM_MODEL_ALIAS}
      PLATFORM_LOAD_MODEL_ON_STARTUP: ${PLATFORM_LOAD_MODEL_ON_STARTUP}
      AGENT_WEBHOOK_URL: ${AGENT_WEBHOOK_URL}
    ports:
      - "8000:8000"
    volumes:
      - ./platform:/app/platform
      - platform_venv:/app/platform/.venv
      - ./shared:/app/shared

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      LLM_TRIAGE_MODEL: ${LLM_TRIAGE_MODEL}
      LLM_ACTION_MODEL: ${LLM_ACTION_MODEL}
      LLM_COMMS_MODEL: ${LLM_COMMS_MODEL}
      MODEL_SERVICE_URL: ${MODEL_SERVICE_URL}
      LOG_LEVEL: ${LOG_LEVEL}
    ports:
      - "8001:8001"
    volumes:
      - ./agent:/app/agent
      - /app/agent/.venv
      - ./shared:/app/shared

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      MODEL_SERVICE_URL: ${MODEL_SERVICE_URL}
      WORKER_MAX_RETRIES: ${WORKER_MAX_RETRIES}
      WORKER_BACKOFF_BASE_SECONDS: ${WORKER_BACKOFF_BASE_SECONDS}
      LOG_LEVEL: ${LOG_LEVEL}
    volumes:
      - ./worker:/app/worker
      - /app/worker/.venv
      - ./shared:/app/shared

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    depends_on:
      - model-service
      - agent
    environment:
      DATABASE_URL: ${DATABASE_URL}
      MODEL_SERVICE_URL: ${MODEL_SERVICE_URL}
      AGENT_URL: ${AGENT_URL}
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app/dashboard
      - /app/dashboard/.venv
      - ./shared:/app/shared

volumes:
  postgres_data:
  mlflow_artifacts:
  platform_venv:
