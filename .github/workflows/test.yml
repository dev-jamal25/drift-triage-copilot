name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test-platform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install platform deps
        working-directory: ./platform
        run: uv sync --all-extras
      - name: Lint
        working-directory: ./platform
        run: uv run ruff check . && uv run ruff format --check .
      - name: Test
        working-directory: ./platform
        run: uv run pytest -q

  lint-and-test-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Set up Python
        run: uv python install 3.12
      - name: Install agent deps
        working-directory: ./agent
        run: uv sync --all-extras
      - name: Lint
        working-directory: ./agent
        run: uv run ruff check . && uv run ruff format --check .
      - name: Test (snapshot trajectories, no API key needed)
        working-directory: ./agent
        run: uv run pytest -q

  build-images:
    runs-on: ubuntu-latest
    needs: [lint-and-test-platform, lint-and-test-agent]
    steps:
      - uses: actions/checkout@v4
      - name: Build all images
        run: docker compose build
